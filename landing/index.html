<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Particle — AI-First Market Terminal</title>
  <meta name="description" content="Particle is an AI-first market terminal that thinks with you. Professional-grade market intelligence powered by AI." />
  <meta name="theme-color" content="#000000" />

  <!-- Open Graph -->
  <meta property="og:title" content="The Particle — AI-First Market Terminal" />
  <meta property="og:description" content="Professional-grade market intelligence powered by AI. Morning briefs, prediction markets, anomaly detection, and a private knowledge vault." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://the-particle.com" />
  <meta property="og:image" content="https://the-particle.com/og-image.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="The Particle — AI-First Market Terminal" />
  <meta name="twitter:description" content="AI-first market terminal for investors who think differently." />

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='%23F97316'/></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #F97316;
      --accent-glow: rgba(249, 115, 22, 0.3);
      --bg: #000000;
      --text-primary: rgba(255, 255, 255, 0.92);
      --text-secondary: rgba(255, 255, 255, 0.55);
      --text-faint: rgba(255, 255, 255, 0.25);
      --border: rgba(255, 255, 255, 0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Video background ─────────────────────────────── */
    .video-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      object-fit: cover;
      width: 100%;
      height: 100%;
      opacity: 0.55;
      filter: saturate(1.2);
    }

    .video-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse at 50% 40%, transparent 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0.85) 100%);
      pointer-events: none;
    }

    /* ── Particle canvas on top ────────────────────────── */
    #particleCanvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Main layout ──────────────────────────────────── */
    .page {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── Logo ─────────────────────────────────────────── */
    .logo-orb {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #FFD4A0, #F97316 40%, #EA580C 70%, #9A3412);
      box-shadow: 0 0 60px rgba(249, 115, 22, 0.35), 0 0 120px rgba(249, 115, 22, 0.12);
      margin-bottom: 24px;
      animation: orb-breathe 3s ease-in-out infinite;
    }

    @keyframes orb-breathe {
      0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(249,115,22,0.35), 0 0 120px rgba(249,115,22,0.12); }
      50% { transform: scale(1.08); box-shadow: 0 0 80px rgba(249,115,22,0.45), 0 0 160px rgba(249,115,22,0.18); }
    }

    /* ── Brand text ───────────────────────────────────── */
    .brand {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.20em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    /* ── Headline ─────────────────────────────────────── */
    .headline {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(32px, 6vw, 56px);
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.15;
      text-align: center;
      margin-bottom: 16px;
      max-width: 600px;
    }

    .headline-accent {
      color: var(--accent);
    }

    /* ── Subtitle ─────────────────────────────────────── */
    .subtitle {
      font-size: 15px;
      color: var(--text-secondary);
      text-align: center;
      max-width: 440px;
      line-height: 1.6;
      margin-bottom: 40px;
      font-weight: 400;
    }

    /* ── CTA button — enter the terminal ─────────────── */
    .cta-enter {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: linear-gradient(180deg, #F97316 0%, #e55a00 100%);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 30px rgba(249, 115, 22, 0.25);
    }

    .cta-enter:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(249, 115, 22, 0.35);
    }

    .cta-enter:active {
      transform: translateY(0);
    }

    .cta-arrow {
      font-size: 16px;
      transition: transform 0.2s ease;
    }

    .cta-enter:hover .cta-arrow {
      transform: translateX(3px);
    }

    /* ── Secondary link ───────────────────────────────── */
    .secondary-link {
      margin-top: 16px;
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 0.06em;
    }

    .secondary-link a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .secondary-link a:hover {
      color: var(--text-primary);
    }

    /* ── Footer ───────────────────────────────────────── */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 4;
      display: flex;
      justify-content: center;
      gap: 24px;
      padding: 16px 24px;
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 0.06em;
    }

    .footer a {
      color: var(--text-faint);
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer a:hover { color: var(--text-secondary); }

    /* ── Mobile ────────────────────────────────────────── */
    @media (max-width: 640px) {
      .page { padding: 32px 20px; }
      .logo-orb { width: 40px; height: 40px; }
      .subtitle { font-size: 14px; }
      .cta-enter { padding: 14px 32px; font-size: 12px; }
    }

    /* ── Prefers reduced motion ─────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .logo-orb { animation: none; }
      .video-bg { display: none; }
    }
  </style>
</head>

<body>
  <!-- Background video — orange volumetric orbs -->
  <video class="video-bg" autoplay muted loop playsinline preload="auto">
    <source src="video.mp4" type="video/mp4" />
  </video>
  <div class="video-overlay"></div>

  <!-- Particle field overlay -->
  <canvas id="particleCanvas"></canvas>

  <!-- Main content — centered, minimal -->
  <div class="page">
    <div class="logo-orb"></div>
    <div class="brand">The Particle</div>

    <h1 class="headline">
      Markets move.<br>
      <span class="headline-accent">Particle thinks.</span>
    </h1>

    <p class="subtitle">
      AI-powered market intelligence. Morning briefs, anomaly detection,
      and a private research vault — built for investors who think differently.
    </p>

    <a href="https://the-particle.com" class="cta-enter">
      Enter Terminal <span class="cta-arrow">&rarr;</span>
    </a>

    <div class="secondary-link">
      New here? <a href="https://the-particle.com">Create your account</a>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>&copy; 2026 Arc Capital</span>
    <a href="https://the-particle.com/terms.html">Terms</a>
    <a href="https://the-particle.com/privacy.html">Privacy</a>
  </div>

  <!-- Minimal particle overlay — connects with video orbs -->
  <script>
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const particles = [];
    const count = Math.min(40, Math.floor(window.innerWidth / 30));

    for (let i = 0; i < count; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5 + 0.5,
        dx: (Math.random() - 0.5) * 0.12,
        dy: (Math.random() - 0.5) * 0.12,
        o: Math.random() * 0.2 + 0.05,
        phase: Math.random() * Math.PI * 2,
      });
    }

    function draw(time) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const t = time * 0.001;

      // Draw connections
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 120) {
            ctx.strokeStyle = `rgba(249, 115, 22, ${0.04 * (1 - dist / 120)})`;
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }

      // Draw particles
      for (const p of particles) {
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < -10) p.x = canvas.width + 10;
        if (p.x > canvas.width + 10) p.x = -10;
        if (p.y < -10) p.y = canvas.height + 10;
        if (p.y > canvas.height + 10) p.y = -10;

        const breathe = Math.sin(t + p.phase) * 0.5 + 0.5;
        const opacity = p.o * (0.5 + breathe * 0.5);

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(249, 115, 22, ${opacity})`;
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>
