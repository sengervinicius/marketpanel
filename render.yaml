# render.yaml — Render.com deployment configuration
# Two services: backend (Node.js) + frontend (static React)

services:
  # ── Backend API + WebSocket server ─────────────────────────────────────────
  - type: web
    name: senger-market-server
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: POLYGON_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # Set to your frontend URL after first deploy (e.g. https://senger-market-client.onrender.com)
      - key: JWT_SECRET
        sync: false          # Generate a strong random secret for JWT signing
      - key: APPLE_CLIENT_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false          # Set this to your Stripe secret key (sk_live_... or sk_test_...)
      - key: STRIPE_PRICE_ID
        sync: false          # Set this to your Stripe recurring price ID (price_...)
      - key: STRIPE_WEBHOOK_SECRET
        sync: false          # Set this to your Stripe webhook secret (whsec_...)

  # ── Frontend static site ────────────────────────────────────────────────────
  - type: web
    name: senger-market-client
    runtime: static
    region: oregon
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to your backend URL e.g. https://senger-market-server.onrender.com
      - key: VITE_WS_URL
        sync: false          # Set to wss://senger-market-server.onrender.com/ws
      - key: VITE_APPLE_CLIENT_ID
        sync: false
      - key: VITE_APPLE_REDIRECT_URI
        sync: false
