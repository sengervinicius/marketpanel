# render.yaml — Render.com deployment configuration
# Two services: backend (Node.js) + frontend (static React)

services:
  # ── Backend API + WebSocket server ─────────────────────────────────────────
  - type: web
    name: bloomberg-terminal-server
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: POLYGON_API_KEY
        sync: false          # Set this manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # Set to your frontend URL after first deploy

  # ── Frontend static site ────────────────────────────────────────────────────
  - type: web
    name: bloomberg-terminal-client
    runtime: static
    region: oregon
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SERVER_URL
        sync: false          # Set to your backend URL e.g. https://bloomberg-terminal-server.onrender.com
      - key: VITE_WS_URL
        sync: false          # Set to wss://bloomberg-terminal-server.onrender.com/ws
