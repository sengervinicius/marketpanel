<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport / PWA ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Particle" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Android PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Particle" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO / Social -->
    <meta name="description" content="Professional market data terminal — real-time prices, portfolio tracking, alerts, and analysis." />

    <!-- Open Graph Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Particle — Professional Market Intelligence" />
    <meta property="og:description" content="Real-time market data terminal with live prices, portfolio tracking, AI insights, and professional analysis tools. Built by Arc Capital." />
    <meta property="og:image" content="https://app.sengermarket.com/og-image.png" />
    <meta property="og:url" content="https://app.sengermarket.com/" />
    <meta property="og:site_name" content="Particle" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Particle — Professional Market Intelligence" />
    <meta name="twitter:description" content="Real-time market data terminal with live prices, portfolio tracking, AI insights, and professional analysis tools." />
    <meta name="twitter:image" content="https://app.sengermarket.com/og-image.png" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://app.sengermarket.com/" />

    <!-- Fonts (Self-hosted to avoid GDPR concerns with Google Fonts CDN) -->
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <!-- Display font for hero text — editorial serif -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" />

    <title>Particle</title>

    <style>
      /* Prevent FOUC */
      html { background: #0a0a0f; }
      body { margin: 0; overflow: hidden; background: #0a0a0f; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      /* iOS safe area */
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      /* Prevent rubber-band overscroll on iOS */
      html, body { overscroll-behavior: none; }
      /* Loading animation */
      @keyframes loader { 0%{transform:translateX(-100%)} 50%{transform:translateX(150%)} 100%{transform:translateX(-100%)} }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader" style="position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;font-family:'IBM Plex Mono',monospace;">
        <div style="font-size:32px;font-weight:600;color:#fff;letter-spacing:8px;margin-bottom:8px;">PARTICLE</div>
        <div style="font-size:12px;color:#666;letter-spacing:4px;margin-bottom:32px;">MARKET TERMINAL</div>
        <div style="width:120px;height:2px;background:#1a1a1a;border-radius:1px;overflow:hidden;">
          <div style="width:40%;height:100%;background:#ff6600;border-radius:1px;animation:loader 1.2s ease-in-out infinite;"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
